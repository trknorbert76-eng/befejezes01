<!doctype html>
<html lang="hu">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Befejezés – Jobb oldal</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
html, body { height: 100%; }
body {
  margin: 0;
  background: #000;
  display: flex;
  justify-content: center;
  align-items: flex-start;
}

.wrap{
  width: min(960px, 100%);
  margin-top: 40px;
  padding: 0 12px;
  box-sizing: border-box;
}

.video{
  position: relative;
  width: 100%;
}

#mainVideo{
  width: 100%;
  height: auto;
  display: block;
  position: relative;
  z-index: 1;
  background: #000;
}

#endImage{
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  opacity: 0;
  transition: opacity 2s ease;
  pointer-events: none;
  z-index: 2;
}

/* Záró szöveg – alapból rejtve */
.note{
  margin: 30px auto 40px auto;
  max-width: 820px;
  text-align: center;
  line-height: 1.5;
  font-size: 17px;
  color: rgba(255,255,255,0.9);

  opacity: 0;
  transform: translateY(15px);
  transition: all 1.2s ease;
}

.note.show{
  opacity: 1;
  transform: translateY(0);
}
</style>
</head>

<body>

<div class="wrap">
  <div class="video">
    <video id="mainVideo" controls playsinline></video>
     
     <img id="endImage" src="jezus.png" alt="">
  </div>

  <div id="closingText" class="note">
    <p>Ez a történet nem azt méri,<br>hogy jó vagy rossz ember vagy.</p>

    <p>Bárhova is kerültél a teszt után,<br>nem minősít.</p>

    <p>A két lator is egyforma volt.</p>

    <p>Csak a végső szorításban<br>másképp látták a valóságot.</p>

    <p>Az egyik még menteni akarta magát.<br>A másik már vállalta a helyzetét.</p>
  </div>
</div>

<script>
const SUPABASE_URL = "https://hhysuxfwdjwlxtmlxnrv.supabase.co";
const SUPABASE_KEY = "sb_publishable_4Btoi0wsypr48xQH31RMaQ_r1YrPpsv";

async function track(event){
  try{
    await fetch(SUPABASE_URL + "/rest/v1/jesus_stats", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "apikey": SUPABASE_KEY,
        "Authorization": "Bearer " + SUPABASE_KEY,
        "Prefer": "return=minimal"
      },
      body: JSON.stringify({ event })
    });
  }catch(e){}
}

const video = document.getElementById("mainVideo");
const closingText = document.getElementById("closingText");
const endImage = document.getElementById("endImage");

const videoSrc = "https://vz-607e77fc-703.b-cdn.net/3a9fc8bb-f848-4863-8a85-d529fc46183f/playlist.m3u8";

if (video.canPlayType('application/vnd.apple.mpegurl')) {
  video.src = videoSrc;
} else if (Hls.isSupported()) {
  const hls = new Hls();
  hls.loadSource(videoSrc);
  hls.attachMedia(video);
}

const SHOW_AT = 90;
const END_SHOW_AT = 110;

let started = false;
let textShown = false;
let endShown = false;
let endedTracked = false;

track("video_page_right");

video.addEventListener("play", () => {
  if (!started) {
    track("video_start_right");
    started = true;
  }
});

video.addEventListener("timeupdate", () => {
  if (!textShown && video.currentTime >= SHOW_AT) {
    closingText.classList.add("show");
    track("video_text_right");
    textShown = true;
  }

  if (!endShown && video.currentTime >= END_SHOW_AT) {
    endImage.style.opacity = 1;
    track("video_endimage_right");
    endShown = true;
  }
});

video.addEventListener("ended", () => {
  if (!endedTracked) {
    track("video_finish_right");
    endedTracked = true;
  }
});

window.addEventListener("load", () => {
  setTimeout(() => {
    video.play().catch(() => {});
  }, 300);
});
</script>

</body>
</html>
